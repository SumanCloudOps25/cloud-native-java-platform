apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-app
  namespace: java-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: java-app

  template:
    metadata:
      labels:
        app: java-app

    spec:
      securityContext:
        fsGroup: 1000

      containers:
      - name: java-app

        image: cloud-native-java-app:v1
        imagePullPolicy: Never

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: java-app-config

        - secretRef:
            name: java-app-secret

        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"

          limits:
            memory: "512Mi"
            cpu: "500m"

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000

          capabilities:
            drop:
              - ALL

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080

          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080

          initialDelaySeconds: 15
          periodSeconds: 5