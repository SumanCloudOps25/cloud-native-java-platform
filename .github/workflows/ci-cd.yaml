name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build-and-deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Trivy Filesystem Scan
      run: |
        trivy fs --severity CRITICAL --exit-code 1 .

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Verify Java
      run: java -version

    - name: Build Application
      working-directory: app
      run: mvn clean package

    - name: Verify JAR
      run: dir app\\target

    - name: SonarQube Scan
      working-directory: app
      shell: powershell
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar "-Dsonar.projectKey=cloud-native-java-platform" "-Dsonar.host.url=http://localhost:9000" "-Dsonar.token=$env:SONAR_TOKEN" "-Dsonar.qualitygate.wait=true"


    - name: Build Docker Image
      working-directory: app
      run: docker build -t cloud-native-java-app:v1 .

    - name: Verify Docker Image
      run: docker images

    - name: Run Trivy Image Scan
      run: |
        trivy image --timeout 15m --severity CRITICAL --exit-code 1 cloud-native-java-app:v1

    - name: Load Image Into Minikube
      run: minikube image load cloud-native-java-app:v1

    - name: Run Trivy Kubernetes Scan
      run: |
        trivy config --severity HIGH,CRITICAL --exit-code 1 k8s/
    
    #
    #- name: Deploy To Kubernetes
    #  run: kubectl apply -f k8s/base/

    - name: Deploy using Helm
      run: helm upgrade --install java-app ./helm -n java-app --create-namespace -f helm/values.yaml    

    - name: Restart Deployment
      run: kubectl rollout restart deployment java-app -n java-app

    - name: Verify Rollout
      run: kubectl rollout status deployment java-app -n java-app
      
    - name: Verify Pods
      run: kubectl get pods -n java-app

    - name: Port Forward Application
      shell: powershell
      run: |
        Start-Process powershell -ArgumentList "kubectl port-forward svc/java-app-service 8085:80 -n java-app"

        Start-Sleep -Seconds 15

    - name: OWASP ZAP Baseline Scan
      run: |
        docker run --rm `
          -v ${PWD}:/zap/wrk/:rw `
          ghcr.io/zaproxy/zaproxy:stable `
          zap-baseline.py `
          -t http://host.docker.internal:8085 `
          -r zap-report.html `
          -I
          
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: zap-report.html