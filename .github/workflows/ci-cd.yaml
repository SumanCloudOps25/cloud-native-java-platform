name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build-and-deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Verify Java
      run: java -version

    - name: Build Application
      working-directory: app
      run: mvn clean package

    - name: Verify JAR
      run: dir app\\target

    - name: Build Docker Image
      working-directory: app
      run: docker build -t cloud-native-java-app:v1 .

    - name: Verify Docker Image
      run: docker images

    - name: Load Image Into Minikube
      run: minikube image load cloud-native-java-app:v1

    - name: Deploy To Kubernetes
      run: kubectl apply -f k8s/

    - name: Restart Deployment
      run: kubectl rollout restart deployment java-app -n java-app

    - name: Verify Pods
      run: kubectl get pods -n java-app